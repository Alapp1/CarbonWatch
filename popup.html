<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarbonWatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="shell">

    <!-- ── Header ─────────────────────────────────────────────────────── -->
    <header>
      <div class="logo">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 1C4.5 1 2 4 2 7c0 2 1 3.5 2.5 4.5C5 12.5 6 13 8 13s3-.5 3.5-1.5C13 10.5 14 9 14 7c0-3-2.5-6-6-6z" fill="#3dff6e" opacity="0.3"/>
          <path d="M8 2.5C5.5 2.5 3.5 5 3.5 7c0 1.5.7 2.8 1.8 3.6" stroke="#3dff6e" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M8 13v2M6 14.5h4" stroke="#3dff6e" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="8" cy="7" r="1.5" fill="#3dff6e"/>
        </svg>
        carbonwatch
      </div>
      <div class="status-pill" id="status">—</div>
    </header>

    <!-- ── Current page ───────────────────────────────────────────────── -->
    <section class="current">
      <div class="domain" id="domain">loading…</div>

      <div class="main-row">
        <div class="co2-block">
          <span class="co2-value" id="co2">—</span>
          <span class="co2-unit">CO₂e</span>
        </div>
        <div class="rating-badge" id="rating">—</div>
      </div>

      <div class="hosting-row">
        <span class="dot" id="green-dot"></span>
        <span class="hosting-label" id="hosting-label">awaiting scan</span>
      </div>

      <div class="cleaner-track">
        <div class="cleaner-fill" id="cleaner-fill"></div>
      </div>
      <div class="cleaner-label" id="cleaner-label"></div>

      <div class="bytes-label" id="bytes-label"></div>
    </section>

    <!-- ── Totals strip ───────────────────────────────────────────────── -->
    <section class="totals">
      <div class="stat">
        <div class="stat-value" id="total-co2">—</div>
        <div class="stat-key">total CO₂e</div>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <div class="stat-value" id="total-pages">0</div>
        <div class="stat-key">pages scanned</div>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <div class="stat-value" id="green-pct">—</div>
        <div class="stat-key">green hosted</div>
      </div>
    </section>

    <!-- ── History ────────────────────────────────────────────────────── -->
    <section class="history">
      <div class="history-header">
        <span class="section-title">recent</span>
        <button class="clear-btn" id="clear-btn">clear</button>
      </div>
      <div class="history-list" id="history-list">
        <div class="empty">no history yet — browse a page!</div>
      </div>
    </section>

  </div>

  <script src="popup.js"></script>
</body>
</html>
